name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    - cron: '0 17 * * *'  # Stage: 11:00 PM Bangladesh (GMT+6) = 5:00 PM UTC
    - cron: '0 9 * * *'   # Prod: 03:00 PM Bangladesh (GMT+6) = 9:00 AM UTC
  workflow_dispatch:
    inputs:
      env:
        description: 'Environment to run tests against'
        required: true
        type: choice
        options:
          - stage
          - prod
          - all
jobs:
  smoke-test:
    if: ${{ github.event_name == 'push' || github.event_name == 'pull_request' }}
    timeout-minutes: 15
    runs-on: ubuntu-latest
    env:
      TEST_ENV: STAGE
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Run Smoke tests (Stage)
      run: npm run test:smoke:ci
    - name: Upload HTML report
      uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-smoke-report
        path: playwright-report/
        retention-days: 30
    - name: Notify Teams
      if: ${{ always() && github.event_name == 'push' }}
      uses: skitionek/notify-microsoft-teams@master
      with:
        webhook_url: ${{ secrets.TEAMS_WEBHOOK_URL }}
        job: ${{ job.status }}
        title: "Smoke Test - Stage"
        text: |
          **Smoke Test Results (Stage)**
          - **Status:** ${{ job.status }}
          - **Trigger:** ${{ github.event_name }}
          - **Commit:** ${{ github.sha }}
          - **Branch:** ${{ github.ref_name }}
          - **Actor:** ${{ github.actor }}
          - [View Report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})

  test-stage:
    if: ${{ github.event_name == 'schedule' && github.event.schedule == '0 17 * * *' || (github.event_name == 'workflow_dispatch' && (github.event.inputs.env == 'stage' || github.event.inputs.env == 'all')) }}
    timeout-minutes: 60
    runs-on: ubuntu-latest
    env:
      TEST_ENV: STAGE
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Run Stage regression tests
      run: npm run test:stage:ci
    - name: Generate monthly summary
      if: ${{ github.event.schedule == '0 17 * * *' }}
      run: npm run report:monthly:stage
    - name: Upload HTML report
      uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-html-report-stage
        path: playwright-report/
        retention-days: 30
    - name: Upload Excel reports
      uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-excel-reports-stage
        path: test-results/excel-reports/*.xlsx
        retention-days: 90
    - name: Upload monthly data
      uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-monthly-data-stage
        path: test-results/excel-reports/monthly-data/
        retention-days: 365
    - name: Notify Teams
      if: ${{ always() }}
      uses: skitionek/notify-microsoft-teams@master
      with:
        webhook_url: ${{ secrets.TEAMS_WEBHOOK_URL }}
        job: ${{ job.status }}
        title: "Regression Test - Stage (Scheduled)"
        text: |
          **Stage Regression Results**
          - **Status:** ${{ job.status }}
          - **Trigger:** Scheduled (11:00 PM BDT)
          - **Commit:** ${{ github.sha }}
          - **Excel Report:** Download from Actions artifacts
          - [View Report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})

  test-prod:
    if: ${{ github.event_name == 'schedule' && github.event.schedule == '0 9 * * *' || (github.event_name == 'workflow_dispatch' && (github.event.inputs.env == 'prod' || github.event.inputs.env == 'all')) }}
    timeout-minutes: 60
    runs-on: ubuntu-latest
    env:
      TEST_ENV: PROD
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Run Prod regression tests
      run: npm run test:prod:ci
    - name: Generate monthly summary
      if: ${{ github.event.schedule == '0 9 * * *' }}
      run: npm run report:monthly:prod
    - name: Upload HTML report
      uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-html-report-prod
        path: playwright-report/
        retention-days: 30
    - name: Upload Excel reports
      uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-excel-reports-prod
        path: test-results/excel-reports/*.xlsx
        retention-days: 90
    - name: Upload monthly data
      uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-monthly-data-prod
        path: test-results/excel-reports/monthly-data/
        retention-days: 365
    - name: Notify Teams
      if: ${{ always() }}
      uses: skitionek/notify-microsoft-teams@master
      with:
        webhook_url: ${{ secrets.TEAMS_WEBHOOK_URL }}
        job: ${{ job.status }}
        title: "Regression Test - Prod (Scheduled)"
        text: |
          **Prod Regression Results**
          - **Status:** ${{ job.status }}
          - **Trigger:** Scheduled (03:00 PM BDT)
          - **Commit:** ${{ github.sha }}
          - **Excel Report:** Download from Actions artifacts
          - [View Report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
