name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    - cron: '45 5 * * *'  # Stage: 11:45 AM Bangladesh (GMT+6) = 5:45 AM UTC
    - cron: '0 10 * * *'  # Prod: 04:00 PM Bangladesh (GMT+6) = 10:00 AM UTC
  workflow_dispatch:
    inputs:
      env:
        description: 'Environment to run tests against'
        required: true
        type: choice
        options:
          - stage
          - prod
          - all
jobs:
  smoke-test:
    if: ${{ github.event_name == 'push' || github.event_name == 'pull_request' }}
    timeout-minutes: 15
    runs-on: ubuntu-latest
    env:
      TEST_ENV: STAGE
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Run Smoke tests (Stage)
      run: npm run test:smoke:ci
    - name: Upload HTML report
      uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-smoke-report
        path: playwright-report/
        retention-days: 30

  test-stage:
    if: ${{ github.event_name == 'schedule' && github.event.schedule == '45 5 * * *' || (github.event_name == 'workflow_dispatch' && (github.event.inputs.env == 'stage' || github.event.inputs.env == 'all')) }}
    timeout-minutes: 60
    runs-on: ubuntu-latest
    env:
      TEST_ENV: STAGE
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Download previous monthly data
      continue-on-error: true
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        mkdir -p test-results/excel-reports/monthly-data/
        ARTIFACT_INFO=$(gh api repos/${{ github.repository }}/actions/artifacts?name=playwright-monthly-data-stage\&per_page=1 2>/dev/null)
        ARTIFACT_ID=$(echo "$ARTIFACT_INFO" | jq -r '.artifacts[0].id // empty')
        if [ -n "$ARTIFACT_ID" ] && [ "$ARTIFACT_ID" != "null" ]; then
          echo "Restoring monthly data from artifact $ARTIFACT_ID"
          gh api repos/${{ github.repository }}/actions/artifacts/$ARTIFACT_ID/zip > /tmp/monthly-data.zip
          unzip -o /tmp/monthly-data.zip -d test-results/excel-reports/monthly-data/ 2>/dev/null
          echo "Previous monthly data restored:"
          ls -la test-results/excel-reports/monthly-data/
        else
          echo "No previous monthly data artifact found — starting fresh"
        fi
    - name: Restore monthly reports cache
      uses: actions/cache@v4
      id: cache-stage
      with:
        path: test-results/excel-reports/
        key: monthly-reports-STAGE-${{ github.run_id }}
        restore-keys: |
          monthly-reports-STAGE-
    - name: Run Stage regression tests
      run: npm run test:stage:ci
    - name: Generate monthly summary
      if: ${{ github.event.schedule == '45 5 * * *' }}
      run: npm run report:monthly:stage
    - name: Upload HTML report
      uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-html-report-stage
        path: playwright-report/
        retention-days: 30
    - name: Upload Excel reports
      uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-excel-reports-stage
        path: test-results/excel-reports/*.xlsx
        retention-days: 90
    - name: Upload monthly data
      uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-monthly-data-stage
        path: test-results/excel-reports/monthly-data/
        retention-days: 90
    - name: Notify Teams
      if: ${{ always() }}
      env:
        TEAMS_STATUS: ${{ job.status }}
        TEAMS_SHA: ${{ github.sha }}
        TEAMS_BRANCH: ${{ github.ref_name }}
        TEAMS_REPO: ${{ github.repository }}
        TEAMS_RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
      run: |
        STATUS_EMOJI="✅"
        if [ "$TEAMS_STATUS" != "success" ]; then STATUS_EMOJI="❌"; fi
        curl -s -H "Content-Type: application/json" -d "{
          \"type\": \"message\",
          \"attachments\": [{
            \"contentType\": \"application/vnd.microsoft.card.adaptive\",
            \"content\": {
              \"type\": \"AdaptiveCard\",
              \"body\": [
                {\"type\": \"TextBlock\", \"text\": \"Stage Regression Results\", \"weight\": \"Bolder\", \"size\": \"Medium\"},
                {\"type\": \"FactSet\", \"facts\": [
                  {\"title\": \"Repository\", \"value\": \"$TEAMS_REPO\"},
                  {\"title\": \"Test\", \"value\": \"all\"},
                  {\"title\": \"Environment\", \"value\": \"stage\"},
                  {\"title\": \"Status\", \"value\": \"$STATUS_EMOJI $TEAMS_STATUS\"},
                  {\"title\": \"Trigger\", \"value\": \"Scheduled (11:45 AM BDT)\"},
                  {\"title\": \"Branch\", \"value\": \"$TEAMS_BRANCH\"}
                ]},
                {\"type\": \"TextBlock\", \"text\": \"Excel reports available in Actions artifacts\", \"isSubtle\": true},
                {\"type\": \"TextBlock\", \"text\": \"[View Report]($TEAMS_RUN_URL)\", \"weight\": \"Bolder\"}
              ],
              \"\$schema\": \"http://adaptivecards.io/schemas/adaptive-card.json\",
              \"version\": \"1.2\"
            }
          }]
        }" ${{ secrets.TEAMS_WEBHOOK_URL }}

  test-prod:
    if: ${{ github.event_name == 'schedule' && github.event.schedule == '0 10 * * *' || (github.event_name == 'workflow_dispatch' && (github.event.inputs.env == 'prod' || github.event.inputs.env == 'all')) }}
    timeout-minutes: 60
    runs-on: ubuntu-latest
    env:
      TEST_ENV: PROD
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Download previous monthly data
      continue-on-error: true
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        mkdir -p test-results/excel-reports/monthly-data/
        ARTIFACT_INFO=$(gh api repos/${{ github.repository }}/actions/artifacts?name=playwright-monthly-data-prod\&per_page=1 2>/dev/null)
        ARTIFACT_ID=$(echo "$ARTIFACT_INFO" | jq -r '.artifacts[0].id // empty')
        if [ -n "$ARTIFACT_ID" ] && [ "$ARTIFACT_ID" != "null" ]; then
          echo "Restoring monthly data from artifact $ARTIFACT_ID"
          gh api repos/${{ github.repository }}/actions/artifacts/$ARTIFACT_ID/zip > /tmp/monthly-data.zip
          unzip -o /tmp/monthly-data.zip -d test-results/excel-reports/monthly-data/ 2>/dev/null
          echo "Previous monthly data restored:"
          ls -la test-results/excel-reports/monthly-data/
        else
          echo "No previous monthly data artifact found — starting fresh"
        fi
    - name: Restore monthly data cache
      uses: actions/cache@v4
      id: cache-prod
      with:
        path: test-results/excel-reports/
        key: monthly-reports-PROD-${{ github.run_id }}
        restore-keys: |
          monthly-reports-PROD-
    - name: Run Prod regression tests
      run: npm run test:prod:ci
    - name: Generate monthly summary
      if: ${{ github.event.schedule == '0 10 * * *' }}
      run: npm run report:monthly:prod
    - name: Upload HTML report
      uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-html-report-prod
        path: playwright-report/
        retention-days: 30
    - name: Upload Excel reports
      uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-excel-reports-prod
        path: test-results/excel-reports/*.xlsx
        retention-days: 90
    - name: Upload monthly data
      uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-monthly-data-prod
        path: test-results/excel-reports/monthly-data/
        retention-days: 90
    - name: Notify Teams
      if: ${{ always() }}
      env:
        TEAMS_STATUS: ${{ job.status }}
        TEAMS_SHA: ${{ github.sha }}
        TEAMS_BRANCH: ${{ github.ref_name }}
        TEAMS_REPO: ${{ github.repository }}
        TEAMS_RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
      run: |
        STATUS_EMOJI="✅"
        if [ "$TEAMS_STATUS" != "success" ]; then STATUS_EMOJI="❌"; fi
        curl -s -H "Content-Type: application/json" -d "{
          \"type\": \"message\",
          \"attachments\": [{
            \"contentType\": \"application/vnd.microsoft.card.adaptive\",
            \"content\": {
              \"type\": \"AdaptiveCard\",
              \"body\": [
                {\"type\": \"TextBlock\", \"text\": \"Prod Regression Results\", \"weight\": \"Bolder\", \"size\": \"Medium\"},
                {\"type\": \"FactSet\", \"facts\": [
                  {\"title\": \"Repository\", \"value\": \"$TEAMS_REPO\"},
                  {\"title\": \"Test\", \"value\": \"all\"},
                  {\"title\": \"Environment\", \"value\": \"prod\"},
                  {\"title\": \"Status\", \"value\": \"$STATUS_EMOJI $TEAMS_STATUS\"},
                  {\"title\": \"Trigger\", \"value\": \"Scheduled (04:00 PM BDT)\"},
                  {\"title\": \"Branch\", \"value\": \"$TEAMS_BRANCH\"}
                ]},
                {\"type\": \"TextBlock\", \"text\": \"Excel reports available in Actions artifacts\", \"isSubtle\": true},
                {\"type\": \"TextBlock\", \"text\": \"[View Report]($TEAMS_RUN_URL)\", \"weight\": \"Bolder\"}
              ],
              \"\$schema\": \"http://adaptivecards.io/schemas/adaptive-card.json\",
              \"version\": \"1.2\"
            }
          }]
        }" ${{ secrets.TEAMS_WEBHOOK_URL }}
