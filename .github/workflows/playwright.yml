name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    - cron: '0 17 * * *'  # Stage: 11:00 PM Bangladesh (GMT+6) = 5:00 PM UTC
    - cron: '0 9 * * *'   # Prod: 03:00 PM Bangladesh (GMT+6) = 9:00 AM UTC
  workflow_dispatch:
    inputs:
      env:
        description: 'Environment to run tests against'
        required: true
        type: choice
        options:
          - stage
          - prod
          - all
jobs:
  smoke-test:
    if: ${{ github.event_name == 'push' || github.event_name == 'pull_request' }}
    timeout-minutes: 15
    runs-on: ubuntu-latest
    env:
      TEST_ENV: STAGE
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Run Smoke tests (Stage)
      run: npm run test:smoke:ci
    - name: Upload HTML report
      uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-smoke-report
        path: playwright-report/
        retention-days: 30

  test-stage:
    if: ${{ github.event_name == 'schedule' && github.event.schedule == '0 17 * * *' || (github.event_name == 'workflow_dispatch' && (github.event.inputs.env == 'stage' || github.event.inputs.env == 'all')) }}
    timeout-minutes: 60
    runs-on: ubuntu-latest
    env:
      TEST_ENV: STAGE
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Run Stage regression tests
      run: npm run test:stage:ci
    - name: Generate monthly summary
      if: ${{ github.event.schedule == '0 17 * * *' }}
      run: npm run report:monthly:stage
    - name: Upload HTML report
      uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-html-report-stage
        path: playwright-report/
        retention-days: 30
    - name: Upload Excel reports
      uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-excel-reports-stage
        path: test-results/excel-reports/*.xlsx
        retention-days: 90
    - name: Upload monthly data
      uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-monthly-data-stage
        path: test-results/excel-reports/monthly-data/
        retention-days: 90
    - name: Notify Teams
      if: ${{ always() }}
      run: |
        curl -s -H "Content-Type: application/json" -d '{
          "type": "message",
          "attachments": [{
            "contentType": "application/vnd.microsoft.card.adaptive",
            "content": {
              "type": "AdaptiveCard",
              "body": [
                {"type": "TextBlock", "text": "Stage Regression Results", "weight": "Bolder", "size": "Medium"},
                {"type": "FactSet", "facts": [
                  {"title": "Status", "value": "${{ job.status }}"},
                  {"title": "Trigger", "value": "Scheduled (11:00 PM BDT)"},
                  {"title": "Commit", "value": "${{ github.sha }}"}
                ]},
                {"type": "TextBlock", "text": "Excel reports available in Actions artifacts", "isSubtle": true},
                {"type": "TextBlock", "text": "[View Report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})", "weight": "Bolder"}
              ],
              "$schema": "http://adaptivecards.io/schemas/adaptive-card.json",
              "version": "1.2"
            }
          }]
        }' ${{ secrets.TEAMS_WEBHOOK_URL }}

  test-prod:
    if: ${{ github.event_name == 'schedule' && github.event.schedule == '0 9 * * *' || (github.event_name == 'workflow_dispatch' && (github.event.inputs.env == 'prod' || github.event.inputs.env == 'all')) }}
    timeout-minutes: 60
    runs-on: ubuntu-latest
    env:
      TEST_ENV: PROD
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Run Prod regression tests
      run: npm run test:prod:ci
    - name: Generate monthly summary
      if: ${{ github.event.schedule == '0 9 * * *' }}
      run: npm run report:monthly:prod
    - name: Upload HTML report
      uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-html-report-prod
        path: playwright-report/
        retention-days: 30
    - name: Upload Excel reports
      uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-excel-reports-prod
        path: test-results/excel-reports/*.xlsx
        retention-days: 90
    - name: Upload monthly data
      uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-monthly-data-prod
        path: test-results/excel-reports/monthly-data/
        retention-days: 90
    - name: Notify Teams
      if: ${{ always() }}
      run: |
        curl -s -H "Content-Type: application/json" -d '{
          "type": "message",
          "attachments": [{
            "contentType": "application/vnd.microsoft.card.adaptive",
            "content": {
              "type": "AdaptiveCard",
              "body": [
                {"type": "TextBlock", "text": "Prod Regression Results", "weight": "Bolder", "size": "Medium"},
                {"type": "FactSet", "facts": [
                  {"title": "Status", "value": "${{ job.status }}"},
                  {"title": "Trigger", "value": "Scheduled (03:00 PM BDT)"},
                  {"title": "Commit", "value": "${{ github.sha }}"}
                ]},
                {"type": "TextBlock", "text": "Excel reports available in Actions artifacts", "isSubtle": true},
                {"type": "TextBlock", "text": "[View Report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})", "weight": "Bolder"}
              ],
              "$schema": "http://adaptivecards.io/schemas/adaptive-card.json",
              "version": "1.2"
            }
          }]
        }' ${{ secrets.TEAMS_WEBHOOK_URL }}
