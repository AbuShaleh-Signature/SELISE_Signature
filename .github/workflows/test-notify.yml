name: Run Specific Test & Notify Teams

on:
  workflow_dispatch:
    inputs:
      test_name:
        description: 'Test to run'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - 'Test 1:'
          - 'Test 2:'
          - 'Test 3:'
          - 'Test 4:'
          - 'Test 5:'
          - 'Test 6:'
          - 'Test 7:'
          - 'Test 8:'
      environment:
        description: 'Environment (stage/prod)'
        required: true
        default: 'stage'
        type: choice
        options:
          - stage
          - prod

jobs:
  test-and-notify:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE20: true
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Get Playwright cache
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != true
        run: npx playwright install --with-deps

      - name: Run specific test
        id: run-test
        continue-on-error: true
        run: |
          if [ "${{ inputs.test_name }}" = "all" ]; then
            if [ "${{ inputs.environment }}" = "prod" ]; then
              npm run test:prod:ci
            else
              npm run test:stage:ci
            fi
          else
            if [ "${{ inputs.environment }}" = "prod" ]; then
              npm run test:prod:ci -- --grep "${{ inputs.test_name }}"
            else
              npm run test:stage:ci -- --grep "${{ inputs.test_name }}"
            fi
          fi

      - name: Send notification to Teams
        if: always()
        run: |
          if [ "${{ steps.run-test.outcome }}" = "success" ]; then
            STATUS="✅ PASSED"
            COLOR="good"
          else
            STATUS="❌ FAILED"
            COLOR="danger"
          fi
          
          curl -H "Content-Type: application/json" \
               -d "{
            \"@type\": \"MessageCard\",
            \"@context\": \"http://schema.org/extensions\",
            \"themeColor\": \"$COLOR\",
            \"summary\": \"Test Results\",
            \"sections\": [{
              \"activityTitle\": \"🧪 SELISE Signature Test Results\",
              \"activitySubtitle\": \"Repository: ${{ github.repository }}\",
              \"facts\": [
                {\"name\": \"Test:\", \"value\": \"${{ inputs.test_name }}\"},
                {\"name\": \"Environment:\", \"value\": \"${{ inputs.environment }}\"},
                {\"name\": \"Status:\", \"value\": \"$STATUS\"},
                {\"name\": \"Branch:\", \"value\": \"${{ github.ref_name }}\"},
                {\"name\": \"Run ID:\", \"value\": \"${{ github.run_id }}\"}
              ],
              \"markdown\": true
            }],
            \"potentialAction\": [{
              \"@type\": \"OpenUri\",
              \"name\": \"View Results\",
              \"targets\": [{\"os\": \"default\", \"uri\": \"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}]
            }]
          }" \
          "${{ secrets.TEAMS_WEBHOOK_URL }}"
